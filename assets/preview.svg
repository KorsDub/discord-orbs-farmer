    <text x="28" y="418" fill="#dbdee1">🎬 eBay Live</text>
    <text x="340" y="418" fill="#FAA61A" text-anchor="end">не принят</text>
    
    <text x="28" y="442" fill="#dbdee1">🎬 Mac Students</text>
    <text x="340" y="442" fill="#FAA61A" text-anchor="end">не принят</text>
    
    <text x="28" y="466" fill="#dbdee1">🎮 Hero Wars: Alliance Mobile</text>
