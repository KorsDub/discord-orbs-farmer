<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="420" viewBox="0 0 380 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b1e"/>
      <stop offset="100%" style="stop-color:#2b2d31"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5865F2"/>
      <stop offset="100%" style="stop-color:#57F287"/>
    </linearGradient>
  </defs>
  
  <!-- Panel background -->
  <rect x="10" y="10" width="360" height="400" rx="14" fill="url(#bg)" stroke="#3f4147" stroke-width="1"/>
  
  <!-- Header -->
  <text x="28" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#dbdee1">🔥 Orbs Farmer STEALTH v4</text>
  <rect x="280" y="26" width="70" height="22" rx="11" fill="#5865F2"/>
  <text x="315" y="41" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">STEALTH 2</text>
  
  <!-- Status -->
  <text x="28" y="72" font-family="system-ui, sans-serif" font-size="13" fill="#b5bac1">🎮 Игра 807/900s</text>
  
  <!-- Progress bar bg -->
  <rect x="28" y="85" width="324" height="8" rx="4" fill="#111214"/>
  <!-- Progress bar fill ~89% -->
  <rect x="28" y="85" width="290" height="8" rx="4" fill="url(#bar)"/>
  
  <!-- Quest list -->
  <g font-family="system-ui, sans-serif" font-size="12">
    <text x="28" y="120" fill="#dbdee1">🎮 NTE 1.2 Version</text>
    <text x="300" y="120" fill="#3BA55C" text-anchor="end">принят</text>
    
    <text x="28" y="145" fill="#dbdee1">🎬 MONOPOLY GO</text>
    <text x="300" y="145" fill="#FAA61A" text-anchor="end">не принят</text>
    
    <text x="28" y="170" fill="#dbdee1">🎬 eBay Live</text>
    <text x="300" y="170" fill="#FAA61A" text-anchor="end">не принят</text>
    
    <text x="28" y="195" fill="#dbdee1">🎬 Mac Students</text>
    <text x="300" y="195" fill="#FAA61A" text-anchor="end">не принят</text>
    
    <text x="28" y="220" fill="#dbdee1">🎮 Hero Wars: Alliance Mobile</text>
    <text x="300" y="220" fill="#FAA61A" text-anchor="end">не принят</text>
    
    <text x="28" y="245" fill="#dbdee1">🎮 EAFC x The World's Game</text>
    <text x="300" y="245" fill="#FAA61A" text-anchor="end">не принят</text>
    
    <text x="28" y="270" fill="#dbdee1">🎮 New Season Meltdown</text>
    <text x="300" y="270" fill="#FAA61A" text-anchor="end">не принят</text>
    
    <text x="28" y="295" fill="#dbdee1">🎮 Dragon Adventures</text>
    <text x="300" y="295" fill="#FAA61A" text-anchor="end">не принят</text>
  </g>
  
  <!-- Stop button -->
  <rect x="28" y="320" width="324" height="40" rx="8" fill="#4e5058"/>
  <text x="190" y="345" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">⏹ СТОП</text>
  
  <!-- Footer -->
  <text x="190" y="380" font-family="system-ui, sans-serif" font-size="10" fill="#949ba4" text-anchor="middle">Авто-принятие: ✅ · Claim: ❌</text>
  <text x="190" y="395" font-family="system-ui, sans-serif" font-size="10" fill="#949ba4" text-anchor="middle">Паузы и медленный прогресс = меньше риска бана</text>
</svg>
